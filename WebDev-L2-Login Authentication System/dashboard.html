<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Document</title>
</head>
<body>
  <div class="d-flex justify-content-center flex-column gap-4 align-items-center vh-100">
    <h2>Welcome</h2>
    <span class="btn btn-warning m-2" onclick="logout()">Logout</span>
  </div>
  <script>
    if (!localStorage.getItem("uid")) {
      alert("Access Denied! Please log in first.");
      window.location.href = "index.html"; 
    }
    const logout=()=>{
      localStorage.removeItem("uid");
      window.location.href = "index.html"; 
    }
  </script>
</body>
</html>
