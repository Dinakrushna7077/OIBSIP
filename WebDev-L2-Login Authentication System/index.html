<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Login Authentication</title>
</head>
<body>
  <div class="d-flex align-items-center justify-content-center w-100 vh-100">
    <form action="#" class="d-flex flex-column w-25 gap-4 p-4 border-2 rounded-2 align-items-center">
      <h4 class="heading text-center rounded-2 p-2 w-100" >Login Auth</h4>
      <div class="w-100">
        <label for="email" class="d-block">Email Or Mobile Number</label>
        <input type="text" id="email" placeholder="Enter mobile no. or email" class="inp">
      </div>
      <div class="w-100">
        <label for="pass" class="d-block">Password</label>
        <input type="password" id="pass" placeholder="Enter Password" class="inp">
      </div>
      <span id="msg"></span>
      <button class="btn btn-primary w-100">Login</button>
    </form>
  </div>
</body>
</html>
