<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="d-flex flex-column justify-content-center align-items-center vh-100">
    <div class="d-flex flex-column bg-secondary p-4 rounded-1 w-25">
      <div class="d-flex w-100 justify-content-between mb-3">
      <input type="text" id="calculation" value="" placeholder="00.0" class="w-100 h-3 border-0 bg-light text-end fw-bold fs-large">
    </div>
    <div class="d-flex w-100 justify-content-between mb-3">
      <button class="btn btn-golden" onclick="calcu('C')">AC</button>
      <button class="btn btn-golden" onclick="calcu('D')">D</button>
      <button class="btn btn-golden" onclick="calcu('%')">%</button>
      <button class="btn btn-golden" onclick="calcu('/')">/</button>
    </div>
    <div class="d-flex  w-100 justify-content-between mb-3">
      <button class="btn btn-golden" onclick="calcu('1')">1</button>
      <button class="btn btn-golden" onclick="calcu('2')">2</button>
      <button class="btn btn-golden" onclick="calcu('3')">3</button>
      <button class="btn btn-golden" onclick="calcu('*')">*</button>
    </div>
    <div class="d-flex w-100 justify-content-between mb-3">
      <button class="btn btn-golden" onclick="calcu('4')">4</button>
      <button class="btn btn-golden" onclick="calcu('5')">5</button>
      <button class="btn btn-golden" onclick="calcu('6')">6</button>
      <button class="btn btn-golden" onclick="calcu('-')">-</button>
    </div>
    <div class="d-flex w-100 justify-content-between mb-3">
      <button class="btn btn-golden" onclick="calcu('7')">7</button>
      <button class="btn btn-golden" onclick="calcu('8')">8</button>
      <button class="btn btn-golden" onclick="calcu('9')">9</button>
      <button class="btn btn-golden" onclick="calcu('+')">+</button>
    </div>
    <div class="d-flex w-100 justify-content-between mb-3 gap-2">
        <button class="btn btn-golden w-50" onclick="calcu('0')">0</button>
        <button class="btn btn-golden w-50" onclick="calcu('=')">=</button>
    </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
