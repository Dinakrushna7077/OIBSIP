<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="d-flex flex-column justify-content-center align-items-center vh-100">
    <div class="d-flex flex-column bg-secondary p-4 rounded-1 w-25">
      <div class="d-flex w-100 justify-content-between mb-3">
      <input type="text" id="evaluation" value="" placeholder="00.0" class="w-100 h-3 border-0 bg-light text-end fw-bold fs-large">
    </div>
    <div class="d-flex w-100 justify-content-between mb-3">
      <button class="btn btn-golden">AC</button>
      <button class="btn btn-golden">C</button>
      <button class="btn btn-golden">%</button>
      <button class="btn btn-golden">/</button>
    </div>
    <div class="d-flex  w-100 justify-content-between mb-3">
      <button class="btn btn-golden">1</button>
      <button class="btn btn-golden">2</button>
      <button class="btn btn-golden">3</button>
      <button class="btn btn-golden">x</button>
    </div>
    <div class="d-flex w-100 justify-content-between mb-3">
      <button class="btn btn-golden">4</button>
      <button class="btn btn-golden">5</button>
      <button class="btn btn-golden">6</button>
      <button class="btn btn-golden">-</button>
    </div>
    <div class="d-flex w-100 justify-content-between mb-3">
      <button class="btn btn-golden">7</button>
      <button class="btn btn-golden">8</button>
      <button class="btn btn-golden">9</button>
      <button class="btn btn-golden">+</button>
    </div>
    <div class="d-flex w-100 justify-content-between mb-3">
      <div class="w-50 d-flex justify-content-between">
        <button class="btn btn-golden">0</button>
        <button class="btn btn-golden mx-1">00</button>
      </div>
      <div class="w-50 d-flex justify-content-end">
              <button class="btn btn-golden w-85">=</button>
      </div>
    </div>
    </div>
  </div>
</body>
</html>
