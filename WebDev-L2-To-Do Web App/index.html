<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do Web App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="d-flex p-2 justify-content-evenly gap-2">
    <div class="w-50 p-4 d-flex flex-column gap-2 align-items-center bg-info rounded-2">
      <div class="status status-total text-center fw-bold fs-large">Total</div>
      <div class="status status-success text-center fw-bold fs-large">Completed</div>
      <div class="status status-pending text-center fw-bold fs-large">Pending</div>
    </div>
    <div class="w-50 p-4 bg-info rounded-2">
      <form class="d-flex flex-column gap-2 align-items-center w-100   p-4">
        <input type="text" id="taskName" placeholder="Enter task" class="inp">
        <textarea rows="2"  id="taskDesc" placeholder="Task Description" class="inp"></textarea>
        <input type="date" id="taskDate" class="inp">
        <span class="" id="msg"></span>
        <input type="button" value="Add Task" class="btn btn-primary add-btn" onclick="formValidation()" id="add-btn">
        <input type="button" value="Update Task" class="btn btn-primary add-btn" onclick="formValidation()" id="update-btn" hidden="true">
      </form>
    </div>
  </div>
  <div class="d-flex  gap-4 p-4 w-100 flex-wrap bg-light" id="pending-list">
    <div class="d-flex flex-column align-items-center justify-content-center bg-pending p-2 rounded-2">
      <h2 class="title">Title</h2>
      <span class="task-pending">pending</span>
      <div>Description</div>
      <div>date</div>
      <div class="d-flex gap-2">
        <button class="btn btn-danger">Delete</button>
        <button class="btn btn-primary">Edit</button>
        <button class="btn btn-success">Complete</button>
      </div>
    </div>

  </div>
  <!-- ---------------------------------------------Completed task list---------------------------------- -->
  <div class="d-flex  gap-4 p-4 w-100 flex-wrap bg-light" id="completed-list">
    <div class="d-flex flex-column align-items-center justify-content-center bg-success p-2 rounded-2">
      <h2 >Title</h2>
      <span class="task-complete">completed</span>
      <div>Description</div>
      <div>date</div>
      <div class="d-flex gap-2">
        <button class="btn btn-danger">Delete</button>
        <button class="btn btn-primary">Edit</button>
        <button class="btn btn-warning">Incomplete</button>
      </div>
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
